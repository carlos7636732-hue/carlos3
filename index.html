.cronometro{
font-size:28px;

/* ========================================= */
/* LAYOUT */
/* ========================================= */

.container{
display:flex;
height:calc(100vh - 90px);
}

/* ========================================= */
/* MENU */
/* ========================================= */

.menu{
width:350px;
padding:20px;
overflow:auto;

background:rgba(0,0,0,.45);
backdrop-filter:blur(10px);

button,

/* ========================================= */

.campo{

margin:20px;
border-radius:20px;
position:relative;
overflow:hidden;

border:4px solid white;

background:
repeating-linear-gradient(
90deg,
#0f7a2d 0px,
#0f7a2d 80px,
#0d6d28 80px,
#0d6d28 160px
);
}

/* LINHAS */

.linha{
position:absolute;
width:100%;
height:4px;
background:white;
top:50%;
transform:translateY(-50%);
}

.circulo{
position:absolute;
width:180px;
height:180px;
border:4px solid white;
border-radius:50%;

top:50%;
left:50%;
transform:translate(-50%,-50%);
}

/* GOLS */

.gol{
position:absolute;
width:180px;
height:70px;
left:50%;
transform:translateX(-50%);

border:5px solid white;
z-index:2;
}

.gol-topo{
top:-5px;
border-bottom:none;
}

.gol-baixo{
bottom:-5px;
border-top:none;
}

/* ========================================= */
/* JOGADOR */
/* ========================================= */

.jogador{
position:absolute;

width:120px;
height:175px;

background:
linear-gradient(#ffdf00,#d4b200);

border-radius:20px;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

font-weight:bold;
color:black;

cursor:grab;
user-select:none;

transition:.2s;

box-shadow:
0 0 10px #ffdf00,
0 0 25px rgba(255,223,0,.8);

animation:entrada .5s ease;
}

.jogador:hover{
transform:scale(1.08);
}

@keyframes entrada{

from{
opacity:0;
transform:scale(.2);
}

to{
opacity:1;
transform:scale(1);
}

}

/* OVER */

.overall{
position:absolute;
top:5px;
left:5px;

background:black;
color:#ffdf00;

padding:5px 8px;
border-radius:10px;

font-size:18px;

font-size:30px;

/* NOME */

text-align:center;

}

/* POSIÇÃO */

.posicao{
font-size:11px;
}

/* STATS */

.stats{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:4px;
padding:5px;
}

.stats span{
background:rgba(0,0,0,.2);
padding:3px 5px;
border-radius:5px;
font-size:10px;
}

/* ========================================= */
/* BOLA */
/* ========================================= */

#bola{
position:absolute;
left:48%;
top:48%;
font-size:45px;
z-index:999;
cursor:grab;
}

/* ========================================= */
/* GOL TEXTO */
/* ========================================= */

#golTexto{
position:absolute;

top:40%;
left:50%;

transform:translateX(-50%);

font-size:80px;
font-weight:bold;

color:#ffdf00;

display:none;

text-shadow:
0 0 20px #ffdf00,
0 0 40px white;

animation:piscar 1s infinite;
}

@keyframes piscar{

0%{
transform:translateX(-50%) scale(1);
}

50%{
transform:translateX(-50%) scale(1.2);
}

100%{
transform:translateX(-50%) scale(1);
}

}

/* ========================================= */

.painelTabela{

top:100px;
right:20px;

width:650px;

/* ========================================= */
/* PARTIDA */

#telaPartida{
position:fixed;
top:0;
left:0;

width:100%;
height:100%;

display:none;
flex-direction:column;
justify-content:center;
align-items:center;

linear-gradient(rgba(0,0,0,.7),rgba(0,0,0,.7)),

#bolaPartida{

.controles{

/* ========================================= */

@media(max-width:900px){

height:auto;

</style>

<script>

const campo =
document.getElementById("campo");

/* ========================================= */
/* CRIAR JOGADOR */
/* ========================================= */

function criarJogador(nome,numero,pos,overall,top,left){

const jogador =
document.createElement("div");

jogador.className = "jogador";

jogador.style.top = top;
jogador.style.left = left;

jogador.innerHTML = `

<div class="overall">
${overall}
</div>

<div class="numero">
${numero}
</div>

<div class="nome">
${nome}
</div>

<div class="posicao">
${pos}
</div>

<div class="stats">

<span>⚡95</span>
<span>🎯88</span>
<span>🧠90</span>
<span>🪄94</span>
<span>🛡40</span>
<span>💪82</span>

</div>

`;

campo.appendChild(jogador);

/* DRAG */

let segurando = false;

let offsetX, offsetY;

jogador.addEventListener("mousedown",e=>{

segurando = true;

offsetX =
e.clientX - jogador.offsetLeft;

offsetY =
e.clientY - jogador.offsetTop;

});

document.addEventListener("mousemove",e=>{

if(!segurando) return;

let x =
e.clientX - offsetX;

let y =
e.clientY - offsetY;

const maxX =
campo.clientWidth -
jogador.clientWidth;

const maxY =
campo.clientHeight -
jogador.clientHeight;

if(x < 0) x = 0;
if(y < 0) y = 0;

if(x > maxX) x = maxX;
if(y > maxY) y = maxY;

jogador.style.left = x + "px";
jogador.style.top = y + "px";

});

document.addEventListener("mouseup",()=>{

segurando = false;

});

}

/* ========================================= */
/* RESET */
/* ========================================= */

function resetarCampo(){

document
.querySelectorAll(".jogador")
.forEach(j=>j.remove());

}

/* ========================================= */
/* FORMAÇÃO */
/* ========================================= */

function mudarFormacao(){

resetarCampo();

const formacao =
document.getElementById("formacao")
.value;

/* 4-3-3 */

if(formacao === "433"){

criarJogador("Alisson",1,"GOL",89,"82%","45%");

criarJogador("Bremer",3,"ZAG",86,"68%","35%");
criarJogador("Marquinhos",5,"ZAG",87,"68%","55%");
criarJogador("Alex Sandro",6,"LE",81,"65%","75%");

criarJogador("Casemiro",8,"VOL",84,"45%","30%");
criarJogador("Bruno G.",17,"MEI",86,"42%","50%");
criarJogador("Paquetá",10,"MEI",85,"45%","70%");

criarJogador("Vini Jr",7,"PE",91,"18%","20%");
criarJogador("Endrick",9,"ATA",82,"10%","45%");
criarJogador("Raphinha",11,"PD",87,"18%","70%");

}

/* 4-4-2 */

if(formacao === "442"){

criarJogador("Alisson",1,"GOL",89,"82%","45%");

criarJogador("Danilo",2,"LD",82,"65%","15%");
criarJogador("Bremer",3,"ZAG",86,"68%","35%");
criarJogador("Marquinhos",5,"ZAG",87,"68%","55%");
criarJogador("Alex Sandro",6,"LE",81,"65%","75%");

criarJogador("Casemiro",8,"VOL",84,"45%","20%");
criarJogador("Bruno G.",17,"MEI",86,"42%","40%");
criarJogador("Paquetá",10,"MEI",85,"42%","60%");
criarJogador("Raphinha",11,"PD",87,"45%","80%");

criarJogador("Vini Jr",7,"ATA",91,"15%","35%");
criarJogador("Endrick",9,"ATA",82,"15%","55%");

}

/* 3-5-2 */

if(formacao === "352"){

criarJogador("Alisson",1,"GOL",89,"82%","45%");

criarJogador("Bremer",3,"ZAG",86,"68%","25%");
criarJogador("Marquinhos",5,"ZAG",87,"68%","45%");
criarJogador("Gabriel",4,"ZAG",85,"68%","65%");

criarJogador("Danilo",2,"ALA",82,"50%","10%");
criarJogador("Casemiro",8,"VOL",84,"45%","30%");
criarJogador("Bruno G.",17,"MEI",86,"42%","50%");
criarJogador("Paquetá",10,"MEI",85,"45%","70%");
criarJogador("Vini Jr",7,"ALA",91,"50%","85%");

criarJogador("Endrick",9,"ATA",82,"15%","35%");
criarJogador("Raphinha",11,"ATA",87,"15%","55%");

}

}

/* ========================================= */

function salvarEscalacao(){

localStorage.setItem(
"campoBrasil",
campo.innerHTML
);

alert("Escalação salva!");

}

/* ========================================= */
/* CARREGAR */
/* ========================================= */

function carregarEscalacao(){

campo.innerHTML =
localStorage.getItem("campoBrasil");

}

/* ========================================= */
/* EXPORTAR */
/* ========================================= */

function exportar(){

html2canvas(document.body)
.then(canvas=>{

const a =
document.createElement("a");

a.download =
"copa2026.png";

a.href =
canvas.toDataURL();

a.click();

});

}

/* ========================================= */
/* CRONÔMETRO */
/* ========================================= */

let segundos = 0;

setInterval(()=>{

segundos++;

let min =
String(Math.floor(segundos/60))
.padStart(2,"0");

let seg =
String(segundos%60)
.padStart(2,"0");

document.getElementById(
"cronometro"
).innerHTML =
`${min}:${seg}`;

},1000);

/* ========================================= */
/* BOLA */
/* ========================================= */

const bola =
document.getElementById("bola");

let segurandoBola = false;

bola.addEventListener("mousedown",()=>{

segurandoBola = true;

});

document.addEventListener("mouseup",()=>{

segurandoBola = false;

});

document.addEventListener("mousemove",e=>{

if(!segurandoBola) return;

const campoRect =
campo.getBoundingClientRect();

let x =
e.clientX - campoRect.left;

let y =
e.clientY - campoRect.top;

bola.style.left = x + "px";
bola.style.top = y + "px";

/* GOL */

if(
x > campo.clientWidth/2 - 90 &&
x < campo.clientWidth/2 + 90 &&
(
y < 40 ||
y > campo.clientHeight - 40
)
){

mostrarGol();

}

});

/* ========================================= */
/* GOL */
/* ========================================= */

function mostrarGol(){

const texto =
document.getElementById(
"golTexto"
);

texto.style.display = "block";

document.getElementById(
"torcida"
).play();

setTimeout(()=>{

texto.style.display = "none";

},3000);

}

/* SIMULAR PARTIDA */
/* ========================================= */

function simularPartida(){

const golsBrasil =
Math.floor(Math.random()*6);

const golsArgentina =
Math.floor(Math.random()*4);

document.getElementById(
"placar"
).innerHTML =
`BRA ${golsBrasil} x ${golsArgentina} ARG`;

if(golsBrasil > golsArgentina){

alert("🇧🇷 Brasil venceu!");

}

else if(golsArgentina > golsBrasil){

alert("❌ Brasil perdeu!");

}

else{

alert("🤝 Empate!");

}

}

/* ========================================= */
/* TELA PARTIDA */
/* ========================================= */

function irParaPartida(){

document.getElementById(
"telaPartida"
).style.display = "flex";

const jogadores =
document.querySelectorAll(".jogador");

const campoPartida =
document.getElementById(
"campoPartida"
);

campoPartida
.querySelectorAll(".jogador")
.forEach(j=>j.remove());

jogadores.forEach(j=>{

const clone =
j.cloneNode(true);

campoPartida.appendChild(clone);

});

}

/* ========================================= */
/* PARTIDA */
/* ========================================= */

let golsBrasil = 0;
let golsArgentina = 0;

function atualizarPlacar(){

document.getElementById(
"placarPartida"
).innerHTML =
`${golsBrasil} x ${golsArgentina}`;

}

function chutarBrasil(){

const chance =
Math.floor(Math.random()*100);

if(chance > 40){

golsBrasil++;

mostrarGol();

}

atualizarPlacar();

}

function chutarArgentina(){

const chance =
Math.floor(Math.random()*100);

if(chance > 55){

golsArgentina++;

mostrarGol();

}

atualizarPlacar();

}

function finalizarPartida(){

let resultado = "";

if(golsBrasil > golsArgentina){

resultado =
"🇧🇷 BRASIL VENCEU!";

}

else if(golsArgentina > golsBrasil){

resultado =
"🇦🇷 ARGENTINA VENCEU!";

}

else{

resultado =
"🤝 EMPATE!";

}

alert(resultado);

document.getElementById(
"telaPartida"
).style.display = "none";

golsBrasil = 0;
golsArgentina = 0;

atualizarPlacar();

}
