<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🇧🇷 Seleção Brasileira ULTRA FIFA MAX</title>

<!-- HTML2CANVAS -->
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
overflow:hidden;
background:
linear-gradient(rgba(0,0,0,.5),rgba(0,0,0,.5)),
url('https://images.unsplash.com/photo-1517466787929-bc90951d0974?q=80&w=1600');
background-size:cover;
background-position:center;
color:white;
}

/* TOPO */

.topo{
height:90px;
display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
background:rgba(0,0,0,.5);
backdrop-filter:blur(10px);
}

.titulo{
font-size:32px;
font-weight:bold;
color:#ffdf00;
text-shadow:0 0 15px #ffdf00;
}

.placar{
font-size:28px;
font-weight:bold;
}

.cronometro{
font-size:26px;
color:#ffdf00;
}

/* CONTAINER */

.container{
display:flex;
height:calc(100vh - 90px);
}

/* MENU */

.menu{
width:350px;
background:rgba(0,0,0,.45);
backdrop-filter:blur(10px);
padding:20px;
overflow-y:auto;
}

.menu h2{
color:#ffdf00;
margin:15px 0 10px;
}

input,
button,
select{
width:100%;
padding:12px;
margin-bottom:10px;
border:none;
border-radius:12px;
font-size:15px;
}

button{
background:#ffdf00;
font-weight:bold;
cursor:pointer;
transition:.2s;
}

button:hover{
transform:scale(1.03);
box-shadow:0 0 15px #ffdf00;
}

/* LISTA */

.lista{
display:flex;
flex-direction:column;
gap:8px;
}

.item{
padding:10px;
border-radius:10px;
background:rgba(255,255,255,.08);
cursor:pointer;
transition:.2s;
}

.item:hover{
background:rgba(255,255,255,.2);
transform:translateX(5px);
}

/* CAMPO */

.campo{
flex:1;
margin:20px;
position:relative;
overflow:hidden;
border-radius:20px;
border:4px solid white;

background:
repeating-linear-gradient(
90deg,
#0f7a2d 0px,
#0f7a2d 80px,
#0d6d28 80px,
#0d6d28 160px
);
}

/* LINHAS */

.linha{
position:absolute;
width:100%;
height:4px;
background:white;
top:50%;
transform:translateY(-50%);
}

.circulo{
position:absolute;
width:180px;
height:180px;
border:4px solid white;
border-radius:50%;
top:50%;
left:50%;
transform:translate(-50%,-50%);
}

/* GOLS */

.gol{
position:absolute;
width:180px;
height:70px;
left:50%;
transform:translateX(-50%);
border:5px solid white;
z-index:2;
}

.gol-topo{
top:-5px;
border-bottom:none;
}

.gol-baixo{
bottom:-5px;
border-top:none;
}

/* JOGADOR */

.jogador{
position:absolute;
width:120px;
height:175px;
border-radius:18px;
background:linear-gradient(#ffdf00,#d4b200);
color:black;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
font-weight:bold;
cursor:grab;
user-select:none;

box-shadow:
0 0 15px #ffdf00,
0 0 30px rgba(255,223,0,.7);

transition:.2s;

animation:entrada .4s ease;
}

@keyframes entrada{

from{
transform:scale(.2);
opacity:0;
}

to{
transform:scale(1);
opacity:1;
}

}

.jogador:hover{
transform:scale(1.08);
}

.overall{
position:absolute;
top:8px;
left:8px;
background:black;
color:#ffdf00;
padding:5px 8px;
border-radius:10px;
font-size:18px;
box-shadow:0 0 10px #ffdf00;
}

.numero{
font-size:30px;
}

.nome{
font-size:14px;
text-align:center;
}

.posicao{
font-size:12px;
}

.stats{
margin-top:5px;
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:4px;
padding:5px;
}

.stats span{
background:rgba(0,0,0,.2);
padding:3px 5px;
border-radius:6px;
font-size:10px;
}

/* REMOVER */

.remover{
position:absolute;
top:-8px;
right:-8px;
width:25px;
height:25px;
border:none;
border-radius:50%;
background:red;
color:white;
cursor:pointer;
}

/* BOLA */

#bola{
position:absolute;
left:48%;
top:48%;
font-size:40px;
cursor:grab;
z-index:100;
}

/* GOL TEXTO */

#golTexto{
position:absolute;
top:40%;
left:50%;
transform:translateX(-50%);
font-size:70px;
font-weight:bold;
color:#ffdf00;
text-shadow:
0 0 20px #ffdf00,
0 0 40px white;
display:none;
z-index:999;
}

/* QUIMICA */

.linhaQuimica{
position:absolute;
height:4px;
background:lime;
z-index:1;
transform-origin:left center;
}

/* CARTAO */

.cartao{
position:absolute;
top:5px;
right:5px;
font-size:18px;
}

/* CLIMA */

.chuva{
filter:brightness(.8);
}

.noite{
filter:brightness(.5);
}

/* PARTICULAS */

.particula{
position:absolute;
width:8px;
height:8px;
background:#ffdf00;
border-radius:50%;
animation:subir 1s linear infinite;
}

@keyframes subir{

from{
transform:translateY(0);
opacity:1;
}

to{
transform:translateY(-100px);
opacity:0;
}

}

/* MOBILE */

@media(max-width:900px){

.container{
flex-direction:column;
}

.menu{
width:100%;
height:320px;
}

.campo{
margin:10px;
}

}

</style>
</head>

<body>

<!-- TOPO -->

<div class="topo">

<div class="titulo">
🇧🇷 SELEÇÃO BRASILEIRA ULTRA FIFA MAX
</div>

<div class="placar" id="placar">
BRA 0 x 0 ARG
</div>

<div class="cronometro" id="cronometro">
00:00
</div>

</div>

<div class="container">

<!-- MENU -->

<div class="menu">

<h2>⚽ Formação</h2>

<select id="formacao">
<option>4-3-3</option>
<option>4-4-2</option>
<option>3-5-2</option>
</select>

<button onclick="mudarFormacao()">
Aplicar Formação
</button>

<button onclick="melhorEscalacao()">
⚡ Melhor Escalação IA
</button>

<button onclick="salvarEscalacao()">
💾 Salvar Escalação
</button>

<button onclick="carregarEscalacao()">
📂 Carregar Escalação
</button>

<button onclick="resetarCampo()">
🗑 Resetar Campo
</button>

<button onclick="exportar()">
📸 Exportar Escalação
</button>

<h2>🌦 Clima</h2>

<select id="clima" onchange="mudarClima()">
<option value="sol">☀️ Sol</option>
<option value="chuva">🌧 Chuva</option>
<option value="noite">🌙 Noite</option>
</select>

<h2>➕ Adicionar Jogador</h2>

<input type="text" id="nome" placeholder="Nome">

<input type="number" id="numero" placeholder="Número">

<input type="text" id="posicao" placeholder="Posição">

<input type="number" id="overall" placeholder="Overall">

<button onclick="adicionarJogador()">
Adicionar Jogador
</button>

<h2>🏦 Banco de Reservas</h2>

<div class="lista" id="listaJogadores"></div>

</div>

<!-- CAMPO -->

<div class="campo" id="campo">

<div class="linha"></div>

<div class="circulo"></div>

<div class="gol gol-topo"></div>

<div class="gol gol-baixo"></div>

<!-- BOLA -->

<div id="bola">⚽</div>

<!-- TEXTO GOL -->

<div id="golTexto">
GOOOOOOLLLLL ⚽
</div>

</div>

</div>

<!-- SOM -->

<audio id="torcida" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_4d4db9c2db.mp3?filename=stadium-crowd-ambience-110673.mp3">
</audio>

<script>

/* JOGADORES */

const jogadores = [

["Alisson",1,"GOL",89],
["Ederson",23,"GOL",88],
["Weverton",12,"GOL",82],

["Danilo",2,"LD",82],
["Bremer",3,"ZAG",86],
["Marquinhos",5,"ZAG",87],
["Alex Sandro",6,"LE",81],

["Casemiro",8,"VOL",84],
["Bruno Guimarães",17,"MEI",86],
["Lucas Paquetá",10,"MEI",85],

["Vinicius Jr.",7,"PE",91],
["Endrick",9,"ATA",82],
["Raphinha",11,"PD",87],

["Neymar",10,"CAM",90]

];

const lista = document.getElementById("listaJogadores");
const campo = document.getElementById("campo");

/* LISTA */

jogadores.forEach(j => {

const div = document.createElement("div");

div.className = "item";

div.innerHTML = `${j[0]} (${j[2]}) - OVR ${j[3]}`;

div.onclick = ()=>{

document.getElementById("nome").value = j[0];
document.getElementById("numero").value = j[1];
document.getElementById("posicao").value = j[2];
document.getElementById("overall").value = j[3];

};

lista.appendChild(div);

});

/* CRIAR JOGADOR */

function criarJogador(nome,numero,pos,overall,top,left){

const jogador = document.createElement("div");

jogador.className = "jogador";

jogador.style.top = top;
jogador.style.left = left;

jogador.innerHTML = `
<button class="remover">X</button>

<div class="overall">${overall}</div>

<div class="numero">${numero}</div>

<div class="nome">${nome}</div>

<div class="posicao">${pos}</div>

<div class="stats">
<span>⚡ 95</span>
<span>🎯 88</span>
<span>🧠 90</span>
<span>🪄 94</span>
<span>🛡 40</span>
<span>💪 82</span>
</div>
`;

campo.appendChild(jogador);

/* REMOVER */

jogador.querySelector(".remover").onclick = ()=>{

jogador.remove();

};

/* DRAG */

let segurando = false;

let offsetX, offsetY;

jogador.addEventListener("mousedown",e=>{

segurando = true;

offsetX = e.clientX - jogador.offsetLeft;
offsetY = e.clientY - jogador.offsetTop;

});

document.addEventListener("mousemove",e=>{

if(!segurando) return;

let x = e.clientX - offsetX;
let y = e.clientY - offsetY;

const maxX = campo.clientWidth - jogador.clientWidth;
const maxY = campo.clientHeight - jogador.clientHeight;

if(x < 0) x = 0;
if(y < 0) y = 0;
if(x > maxX) x = maxX;
if(y > maxY) y = maxY;

jogador.style.left = x + "px";
jogador.style.top = y + "px";

});

document.addEventListener("mouseup",()=>{

segurando = false;

});

}

/* ADICIONAR */

function adicionarJogador(){

const nome = document.getElementById("nome").value;
const numero = document.getElementById("numero").value;
const pos = document.getElementById("posicao").value;
const overall = document.getElementById("overall").value;

if(!nome || !numero || !pos || !overall){

alert("Preencha tudo!");
return;

}

criarJogador(nome,numero,pos,overall,"40%","40%");

}

/* RESET */

function resetarCampo(){

document.querySelectorAll(".jogador").forEach(j=>{

j.remove();

});

}

/* SALVAR */

function salvarEscalacao(){

const dados = [];

document.querySelectorAll(".jogador").forEach(j=>{

dados.push({

html:j.innerHTML,
top:j.style.top,
left:j.style.left

});

});

localStorage.setItem(
"escalacaoBrasil",
JSON.stringify(dados)
);

alert("Escalação salva!");

}

/* CARREGAR */

function carregarEscalacao(){

resetarCampo();

const dados =
JSON.parse(
localStorage.getItem("escalacaoBrasil")
);

if(!dados) return;

dados.forEach(d=>{

const div = document.createElement("div");

div.className = "jogador";

div.innerHTML = d.html;

div.style.top = d.top;
div.style.left = d.left;

campo.appendChild(div);

});

}

/* FORMAÇÃO */

function mudarFormacao(){

resetarCampo();

criarJogador("Alisson",1,"GOL",89,"82%","45%");

criarJogador("Danilo",2,"LD",82,"65%","15%");
criarJogador("Bremer",3,"ZAG",86,"68%","35%");
criarJogador("Marquinhos",5,"ZAG",87,"68%","55%");
criarJogador("Alex Sandro",6,"LE",81,"65%","75%");

criarJogador("Casemiro",8,"VOL",84,"45%","30%");
criarJogador("Bruno G.",17,"MEI",86,"42%","50%");
criarJogador("Lucas Paquetá",10,"MEI",85,"45%","70%");

criarJogador("Vinicius Jr.",7,"PE",91,"18%","20%");
criarJogador("Endrick",9,"ATA",82,"10%","45%");
criarJogador("Raphinha",11,"PD",87,"18%","70%");

}

/* IA */

function melhorEscalacao(){

resetarCampo();

const melhores = [...jogadores]
.sort((a,b)=>b[3]-a[3])
.slice(0,11);

let y = 10;

melhores.forEach((j,i)=>{

criarJogador(
j[0],
j[1],
j[2],
j[3],
`${y}%`,
`${10 + (i*7)}%`
);

y += 5;

});

}

/* CLIMA */

function mudarClima(){

const clima = document.getElementById("clima").value;

document.body.classList.remove(
"chuva",
"noite"
);

if(clima === "chuva"){

document.body.classList.add("chuva");

}

if(clima === "noite"){

document.body.classList.add("noite");

}

}

/* GOL */

function gol(){

const texto = document.getElementById("golTexto");

texto.style.display = "block";

document.getElementById("torcida").play();

setTimeout(()=>{

texto.style.display = "none";

},3000);

}

/* BOLA */

const bola = document.getElementById("bola");

let segurandoBola = false;

bola.addEventListener("mousedown",()=>{

segurandoBola = true;

});

document.addEventListener("mouseup",()=>{

segurandoBola = false;

});

document.addEventListener("mousemove",e=>{

if(!segurandoBola) return;

const campoRect = campo.getBoundingClientRect();

let x = e.clientX - campoRect.left;
let y = e.clientY - campoRect.top;

if(x < 0) x = 0;
if(y < 0) y = 0;

if(x > campo.clientWidth-40)
x = campo.clientWidth-40;

if(y > campo.clientHeight-40)
y = campo.clientHeight-40;

bola.style.left = x + "px";
bola.style.top = y + "px";

/* GOL */

if(
x > campo.clientWidth/2 - 90 &&
x < campo.clientWidth/2 + 90 &&
(
y < 40 ||
y > campo.clientHeight - 40
)
){

gol();

}

});

/* MOBILE */

bola.addEventListener("touchmove",e=>{

const touch = e.touches[0];

bola.style.left = touch.clientX + "px";
bola.style.top = touch.clientY + "px";

});

/* CRONOMETRO */

let segundos = 0;

setInterval(()=>{

segundos++;

let min =
String(Math.floor(segundos/60))
.padStart(2,"0");

let seg =
String(segundos%60)
.padStart(2,"0");

document.getElementById("cronometro")
.innerHTML = `${min}:${seg}`;

},1000);

/* PARTICULAS */

setInterval(()=>{

const p = document.createElement("div");

p.className = "particula";

p.style.left =
Math.random()*window.innerWidth+"px";

p.style.top =
window.innerHeight+"px";

document.body.appendChild(p);

setTimeout(()=>{

p.remove();

},1000);

},250);

/* EXPORTAR */

function exportar(){

html2canvas(document.body).then(canvas=>{

const a = document.createElement("a");

a.download = "escalacao.png";

a.href = canvas.toDataURL();

a.click();

});

}

/* SOM */

document.body.addEventListener("click",()=>{

document.getElementById("torcida").play();

},{once:true});

/* START */

mudarFormacao();

</script>

</body>
</html>
