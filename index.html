<script>

/* EVENTOS DA PARTIDA */

let eventos = [];

const atacantesAdv = {

"Argentina":["Messi","Julián Álvarez","Lautaro Martínez"],
"França":["Mbappé","Dembélé","Griezmann"],
"Espanha":["Yamal","Morata","Nico Williams"],
"Inglaterra":["Kane","Bellingham","Saka"],
"Alemanha":["Musiala","Havertz","Wirtz"],
"Portugal":["Cristiano Ronaldo","Bruno Fernandes","Rafael Leão"],
"Uruguai":["Darwin Núñez","Valverde","Araújo"]

};

/* GOLS BRASIL */

for(let i=0;i<golsBrasil;i++){

const jogadorGol =
nomesJogadores[
Math.floor(Math.random()*nomesJogadores.length)
];

const minuto =
Math.floor(Math.random()*90)+1;

eventos.push({

minuto:minuto,

texto:
`${minuto}' 🇧🇷 ⚽ ${jogadorGol}`

});

}

/* GOLS ADVERSÁRIO */

for(let i=0;i<golsAdv;i++){

const jogadorGolAdv =

atacantesAdv[adversario][
Math.floor(
Math.random()*
atacantesAdv[adversario].length
)
];

const minuto =
Math.floor(Math.random()*90)+1;

eventos.push({

minuto:minuto,

texto:
`${minuto}' ${adversario} ⚽ ${jogadorGolAdv}`

});

}

/* ORDENAR */

eventos.sort(
(a,b)=>a.minuto-b.minuto
);

const listaEventos =

eventos
.map(e=>e.texto)
.join("<br>");

/* RESULTADO */

const texto = `
<div>

<h2>
🇧🇷 Brasil ${golsBrasil}
x
${golsAdv} ${adversario}
</h2>

<br>

${listaEventos}

</div>
`;

document.getElementById(
"resultadoPartida"
).innerHTML = texto;

</script>
