<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🇧🇷 Seleção Brasileira ULTRA FIFA</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:
linear-gradient(rgba(0,0,0,.5),rgba(0,0,0,.5)),
url('https://images.unsplash.com/photo-1517466787929-bc90951d0974?q=80&w=1600');
background-size:cover;
background-position:center;
color:white;
overflow:hidden;
}

/* TOPO */

.topo{
height:90px;
background:rgba(0,0,0,.5);
display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
backdrop-filter:blur(10px);
}

.titulo{
font-size:32px;
font-weight:bold;
color:#ffdf00;
text-shadow:0 0 20px #ffdf00;
}

/* PLACAR */

.placar{
font-size:28px;
font-weight:bold;
}

/* CRONOMETRO */

.cronometro{
font-size:26px;
color:#ffdf00;
text-shadow:0 0 10px #ffdf00;
}

/* CONTAINER */

.container{
display:flex;
height:calc(100vh - 90px);
}

/* MENU */

.menu{
width:360px;
background:rgba(0,0,0,.45);
backdrop-filter:blur(10px);
padding:20px;
overflow-y:auto;
}

.menu h2{
margin-bottom:10px;
margin-top:15px;
color:#ffdf00;
}

input,
button,
select{
width:100%;
padding:12px;
margin-bottom:10px;
border:none;
border-radius:12px;
font-size:15px;
}

button{
background:#ffdf00;
font-weight:bold;
cursor:pointer;
transition:.2s;
}

button:hover{
transform:scale(1.03);
box-shadow:0 0 15px #ffdf00;
}

/* LISTA */

.lista{
display:flex;
flex-direction:column;
gap:8px;
}

.item{
padding:10px;
border-radius:10px;
background:rgba(255,255,255,.08);
cursor:pointer;
transition:.2s;
}

.item:hover{
background:rgba(255,255,255,.2);
transform:translateX(5px);
}

/* CAMPO */

.campo{
flex:1;
margin:20px;
border-radius:20px;
position:relative;
overflow:hidden;
border:4px solid white;

background:
repeating-linear-gradient(
90deg,
#0f7a2d 0px,
#0f7a2d 80px,
#0d6d28 80px,
#0d6d28 160px
);
}

/* LINHAS */

.linha{
position:absolute;
width:100%;
height:4px;
background:white;
top:50%;
transform:translateY(-50%);
}

.circulo{
position:absolute;
width:180px;
height:180px;
border:4px solid white;
border-radius:50%;
top:50%;
left:50%;
transform:translate(-50%,-50%);
}

/* GOLS */

.gol{
position:absolute;
width:180px;
height:70px;
left:50%;
transform:translateX(-50%);
border:5px solid white;
z-index:2;
}

.gol-topo{
top:-5px;
border-bottom:none;
}

.gol-baixo{
bottom:-5px;
border-top:none;
}

/* JOGADORES */

.jogador{
position:absolute;
width:120px;
height:150px;
background:linear-gradient(#ffdf00,#d4b200);
color:black;
border-radius:18px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
font-weight:bold;
cursor:grab;
user-select:none;

box-shadow:
0 0 10px #ffdf00,
0 0 25px rgba(255,223,0,.7);

transition:.2s;
}

.jogador:hover{
transform:scale(1.08);
}

.numero{
font-size:30px;
}

.nome{
font-size:14px;
margin-top:5px;
}

.posicao{
font-size:12px;
margin-bottom:5px;
}

/* STATS FIFA */

.stats{
margin-top:5px;
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:4px;
padding:5px;
}

.stats span{
background:rgba(0,0,0,.2);
padding:3px 5px;
border-radius:6px;
font-size:10px;
font-weight:bold;
}

/* REMOVER */

.remover{
position:absolute;
top:-8px;
right:-8px;
width:25px;
height:25px;
border:none;
border-radius:50%;
background:red;
color:white;
cursor:pointer;
}

/* MOBILE */

@media(max-width:900px){

.container{
flex-direction:column;
}

.menu{
width:100%;
height:320px;
}

.campo{
margin:10px;
}

}

</style>
</head>

<body>

<!-- TOPO -->

<div class="topo">

<div class="titulo">
🇧🇷 SELEÇÃO BRASILEIRA ULTRA
</div>

<div class="placar">
BRA 0 x 0 ARG
</div>

<div class="cronometro" id="cronometro">
00:00
</div>

</div>

<div class="container">

<!-- MENU -->

<div class="menu">

<h2>Formação</h2>

<select id="formacao">
<option value="433">4-3-3</option>
<option value="442">4-4-2</option>
<option value="352">3-5-2</option>
</select>

<button onclick="mudarFormacao()">
Aplicar Formação
</button>

<button onclick="salvarEscalacao()">
Salvar Escalação
</button>

<button onclick="carregarEscalacao()">
Carregar Escalação
</button>

<button onclick="resetarCampo()">
Resetar Campo
</button>

<h2>Adicionar Jogador</h2>

<input type="text" id="nome" placeholder="Nome">

<input type="number" id="numero" placeholder="Número">

<input type="text" id="posicao" placeholder="Posição">

<button onclick="adicionarJogador()">
Adicionar Jogador
</button>

<h2>Banco de Reservas</h2>

<div class="lista" id="listaJogadores"></div>

</div>

<!-- CAMPO -->

<div class="campo" id="campo">

<div class="linha"></div>

<div class="circulo"></div>

<div class="gol gol-topo"></div>

<div class="gol gol-baixo"></div>

</div>

</div>

<!-- SOM -->

<audio id="torcida" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_4d4db9c2db.mp3?filename=stadium-crowd-ambience-110673.mp3" type="audio/mpeg">
</audio>

<script>

/* JOGADORES */

const jogadores = [

["Alisson",1,"GOL"],
["Ederson",23,"GOL"],
["Weverton",12,"GOL"],

["Alex Sandro",6,"LE"],
["Danilo",2,"LD"],
["Douglas Santos",16,"LE"],
["Wesley",13,"LD"],

["Bremer",3,"ZAG"],
["Gabriel Magalhães",4,"ZAG"],
["Ibañez",14,"ZAG"],
["Léo Pereira",15,"ZAG"],
["Marquinhos",5,"ZAG"],

["Bruno Guimarães",17,"MEI"],
["Casemiro",8,"VOL"],
["Danilo Santos",18,"VOL"],
["Fabinho",19,"VOL"],
["Lucas Paquetá",10,"MEI"],

["Endrick",9,"ATA"],
["Gabriel Martinelli",11,"PE"],
["Igor Thiago",21,"ATA"],
["Luiz Henrique",22,"PD"],
["Matheus Cunha",20,"ATA"],
["Neymar",10,"CAM"],
["Raphinha",7,"PD"],
["Rayan",24,"ATA"],
["Vinicius Jr.",7,"PE"]

];

const lista = document.getElementById("listaJogadores");
const campo = document.getElementById("campo");

/* LISTA */

jogadores.forEach(j => {

const div = document.createElement("div");

div.className = "item";

div.innerHTML = `${j[0]} (${j[2]})`;

div.onclick = () => {

document.getElementById("nome").value = j[0];
document.getElementById("numero").value = j[1];
document.getElementById("posicao").value = j[2];

};

lista.appendChild(div);

});

/* CRIAR JOGADOR */

function criarJogador(nome,numero,pos,top,left){

const jogador = document.createElement("div");

jogador.className = "jogador";

jogador.style.top = top;
jogador.style.left = left;

jogador.innerHTML = `
<button class="remover">X</button>

<div class="numero">${numero}</div>

<div class="nome">${nome}</div>

<div class="posicao">${pos}</div>

<div class="stats">
<span>⚡ 95</span>
<span>🎯 88</span>
<span>🧠 90</span>
<span>🪄 94</span>
<span>🛡 40</span>
<span>💪 82</span>
</div>
`;

campo.appendChild(jogador);

/* REMOVER */

jogador.querySelector(".remover").onclick = ()=>{

jogador.remove();

};

/* DRAG */

let segurando = false;

let offsetX, offsetY;

jogador.addEventListener("mousedown", e => {

segurando = true;

offsetX = e.clientX - jogador.offsetLeft;
offsetY = e.clientY - jogador.offsetTop;

});

document.addEventListener("mousemove", e => {

if(!segurando) return;

let x = e.clientX - offsetX;
let y = e.clientY - offsetY;

const maxX = campo.clientWidth - jogador.clientWidth;
const maxY = campo.clientHeight - jogador.clientHeight;

if(x < 0) x = 0;
if(y < 0) y = 0;
if(x > maxX) x = maxX;
if(y > maxY) y = maxY;

jogador.style.left = x + "px";
jogador.style.top = y + "px";

});

document.addEventListener("mouseup", ()=>{

segurando = false;

});

/* MOBILE */

jogador.addEventListener("touchmove", e => {

const touch = e.touches[0];

jogador.style.left = touch.clientX - 60 + "px";
jogador.style.top = touch.clientY - 75 + "px";

});

}

/* ADICIONAR */

function adicionarJogador(){

const nome = document.getElementById("nome").value;
const numero = document.getElementById("numero").value;
const pos = document.getElementById("posicao").value;

if(!nome || !numero || !pos){

alert("Preencha tudo!");

return;

}

criarJogador(nome,numero,pos,"40%","40%");

}

/* RESET */

function resetarCampo(){

document.querySelectorAll(".jogador").forEach(j=>{

j.remove();

});

}

/* SALVAR */

function salvarEscalacao(){

const dados = [];

document.querySelectorAll(".jogador").forEach(j=>{

dados.push({

html:j.innerHTML,
top:j.style.top,
left:j.style.left

});

});

localStorage.setItem(
"escalacaoBrasil",
JSON.stringify(dados)
);

alert("Escalação salva!");

}

/* CARREGAR */

function carregarEscalacao(){

resetarCampo();

const dados =
JSON.parse(
localStorage.getItem("escalacaoBrasil")
);

if(!dados) return;

dados.forEach(d=>{

const div = document.createElement("div");

div.className = "jogador";

div.innerHTML = d.html;

div.style.top = d.top;
div.style.left = d.left;

campo.appendChild(div);

});

}

/* FORMAÇÃO */

function mudarFormacao(){

resetarCampo();

criarJogador("Alisson",1,"GOL","82%","45%");

criarJogador("Danilo",2,"LD","65%","15%");
criarJogador("Bremer",3,"ZAG","68%","35%");
criarJogador("Marquinhos",5,"ZAG","68%","55%");
criarJogador("Alex Sandro",6,"LE","65%","75%");

criarJogador("Casemiro",8,"VOL","45%","30%");
criarJogador("Bruno G.",17,"MEI","42%","50%");
criarJogador("Lucas Paquetá",10,"MEI","45%","70%");

criarJogador("Vinicius Jr.",7,"PE","18%","20%");
criarJogador("Endrick",9,"ATA","10%","45%");
criarJogador("Raphinha",11,"PD","18%","70%");

}

/* CRONOMETRO */

let segundos = 0;

setInterval(()=>{

segundos++;

let min =
String(Math.floor(segundos/60))
.padStart(2,"0");

let seg =
String(segundos%60)
.padStart(2,"0");

document.getElementById("cronometro")
.innerHTML = `${min}:${seg}`;

},1000);

/* SOM */

document.body.addEventListener("click",()=>{

document.getElementById("torcida").play();

},{once:true});

/* INICIAR */

mudarFormacao();

</script>

</body>
</html>
