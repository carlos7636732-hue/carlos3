<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🇧🇷 Seleção Brasileira Ultra FIFA</title>

<style>

/* ========================================= */
/* RESET */
/* ========================================= */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:
linear-gradient(rgba(0,0,0,.5),rgba(0,0,0,.5)),
url('https://images.unsplash.com/photo-1517466787929-bc90951d0974?q=80&w=1600');

background-size:cover;
background-position:center;

color:white;

overflow:hidden;

}

/* ========================================= */
/* INTRO */
/* ========================================= */

#intro{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:
linear-gradient(rgba(0,0,0,.85),rgba(0,0,0,.85)),
url('https://images.unsplash.com/photo-1517466787929-bc90951d0974?q=80&w=1600');

background-size:cover;
background-position:center;

display:flex;
justify-content:center;
align-items:center;

z-index:999999;

animation:sumirIntro 5s forwards;

}

.introConteudo{

text-align:center;

animation:zoomIntro 2s ease;

}

.logoIntro{

font-size:70px;

color:#ffdf00;

text-shadow:
0 0 20px #ffdf00,
0 0 40px #ffdf00,
0 0 80px white;

margin-bottom:20px;

animation:pulsar 1.5s infinite;

}

.subIntro{

font-size:28px;

letter-spacing:8px;

margin-bottom:40px;

}

.bolaIntro{

font-size:90px;

animation:girar 2s linear infinite;

}

/* ========================================= */
/* TOPO */
/* ========================================= */

.topo{

height:90px;

background:rgba(0,0,0,.5);

display:flex;
justify-content:space-between;
align-items:center;

padding:20px;

backdrop-filter:blur(10px);

}

.titulo{

font-size:32px;
font-weight:bold;

color:#ffdf00;

text-shadow:
0 0 20px #ffdf00;

}

.placar{

font-size:28px;
font-weight:bold;

}

.crono{

font-size:26px;

color:#ffdf00;

text-shadow:
0 0 10px #ffdf00;

}

/* ========================================= */
/* CONTAINER */
/* ========================================= */

.container{

display:flex;

height:calc(100vh - 90px);

}

/* ========================================= */
/* MENU */
/* ========================================= */

.menu{

width:360px;

background:rgba(0,0,0,.45);

backdrop-filter:blur(10px);

padding:20px;

overflow-y:auto;

}

.menu h2{

margin:15px 0;

color:#ffdf00;

}

/* BOTÕES */

button,
input,
select{

width:100%;

padding:12px;

margin-bottom:10px;

border:none;
border-radius:12px;

font-size:15px;

}

button{

background:#ffdf00;

font-weight:bold;

cursor:pointer;

transition:.2s;

}

button:hover{

transform:scale(1.03);

box-shadow:
0 0 20px #ffdf00;

}

/* ========================================= */
/* LISTA */
/* ========================================= */

.lista{

display:flex;
flex-direction:column;
gap:8px;

}

.item{

padding:10px;

border-radius:10px;

background:rgba(255,255,255,.08);

cursor:pointer;

transition:.2s;

}

.item:hover{

transform:translateX(5px);

background:rgba(255,255,255,.2);

}

/* ========================================= */
/* CAMPO */
/* ========================================= */

.campo{

flex:1;

margin:20px;

position:relative;

border-radius:25px;

overflow:hidden;

border:4px solid white;

background:
repeating-linear-gradient(
90deg,
#0f7a2d 0px,
#0f7a2d 80px,
#0d6d28 80px,
#0d6d28 160px
);

}

/* LINHAS */

.linha-meio{

position:absolute;

width:100%;
height:4px;

background:white;

top:50%;

transform:translateY(-50%);

}

.centro{

position:absolute;

width:180px;
height:180px;

border:4px solid white;
border-radius:50%;

top:50%;
left:50%;

transform:translate(-50%,-50%);

}

/* GOLS */

.gol{

position:absolute;

width:180px;
height:70px;

left:50%;

transform:translateX(-50%);

border:5px solid white;

z-index:2;

}

.topo-gol{

top:-5px;

border-bottom:none;

}

.baixo-gol{

bottom:-5px;

border-top:none;

}

/* ========================================= */
/* JOGADORES */
/* ========================================= */

.jogador{

position:absolute;

width:100px;
height:100px;

background:
linear-gradient(#ffdf00,#d1b400);

color:black;

border-radius:18px;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

cursor:grab;

font-weight:bold;

box-shadow:
0 0 10px #ffdf00,
0 0 30px rgba(255,223,0,.6);

transition:.15s;

user-select:none;

z-index:10;

}

.jogador:hover{

transform:scale(1.08);

}

/* OVERALL */

.overall{

position:absolute;

top:-10px;
left:-10px;

background:black;

color:#ffdf00;

padding:6px 8px;

border-radius:50%;

font-size:14px;

border:2px solid #ffdf00;

}

/* NUMERO */

.numero{

font-size:28px;

}

/* NOME */

.nome{

font-size:13px;

}

/* POS */

.pos{

font-size:11px;

}

/* REMOVER */

.remover{

position:absolute;

top:-8px;
right:-8px;

width:25px;
height:25px;

border:none;
border-radius:50%;

background:red;

color:white;

cursor:pointer;

}

/* ========================================= */
/* RESULTADO */
/* ========================================= */

#resultadoPartida{

margin-top:15px;

padding:15px;

border-radius:15px;

background:rgba(255,255,255,.08);

font-size:18px;

text-align:center;

font-weight:bold;

}

/* ========================================= */
/* ANIMAÇÕES */
/* ========================================= */

@keyframes girar{

from{
transform:rotate(0deg);
}

to{
transform:rotate(360deg);
}

}

@keyframes pulsar{

0%{
transform:scale(1);
}

50%{
transform:scale(1.1);
}

100%{
transform:scale(1);
}

}

@keyframes zoomIntro{

from{
transform:scale(.5);
opacity:0;
}

to{
transform:scale(1);
opacity:1;
}

}

@keyframes sumirIntro{

0%{
opacity:1;
visibility:visible;
}

80%{
opacity:1;
}

100%{
opacity:0;
visibility:hidden;
}

}

@keyframes golZoom{

0%{
transform:translateX(-50%) scale(.2);
opacity:0;
}

50%{
transform:translateX(-50%) scale(1.2);
opacity:1;
}

100%{
transform:translateX(-50%) scale(1);
opacity:0;
}

}

/* ========================================= */
/* GOL ANIMAÇÃO */
/* ========================================= */

.golAnimacao{

position:absolute;

top:40%;
left:50%;

transform:translateX(-50%);

font-size:80px;

font-weight:bold;

color:#ffdf00;

text-shadow:
0 0 20px #ffdf00,
0 0 40px white;

z-index:9999;

animation:golZoom 2s ease;

}

/* ========================================= */
/* MOBILE */
/* ========================================= */

@media(max-width:900px){

.container{
flex-direction:column;
}

.menu{
width:100%;
height:320px;
}

.campo{
margin:10px;
height:100%;
}

.logoIntro{
font-size:40px;
}

.subIntro{
font-size:18px;
}

}

</style>

</head>

<body>

<!-- ========================================= -->
<!-- INTRO -->
<!-- ========================================= -->

<div id="intro">

<div class="introConteudo">

<h1 class="logoIntro">
🇧🇷 SELEÇÃO BRASILEIRA
</h1>

<p class="subIntro">
ULTRA FIFA EXPERIENCE
</p>

<div class="bolaIntro">
⚽
</div>

</div>

</div>

<!-- ========================================= -->
<!-- TOPO -->
<!-- ========================================= -->

<div class="topo">

<div class="titulo">
🇧🇷 SELEÇÃO BRASILEIRA ULTRA
</div>

<div class="placar">
BRA 0 x 0 ARG
</div>

<div class="crono" id="cronometro">
00:00
</div>

</div>

<!-- ========================================= -->
<!-- CONTAINER -->
<!-- ========================================= -->

<div class="container">

<!-- MENU -->

<div class="menu">

<h2>⚽ Formação</h2>

<select id="formacao">

<option value="433">4-3-3</option>
<option value="442">4-4-2</option>
<option value="352">3-5-2</option>

</select>

<button onclick="mudarFormacao()">
Aplicar Formação
</button>

<button onclick="salvarEscalacao()">
Salvar Escalação
</button>

<button onclick="carregarEscalacao()">
Carregar Escalação
</button>

<button onclick="resetarCampo()">
Resetar Campo
</button>

<h2>➕ Adicionar Jogador</h2>

<input type="text" id="nome" placeholder="Nome">

<input type="number" id="numero" placeholder="Número">

<input type="text" id="posicao" placeholder="Posição">

<button onclick="adicionarJogador()">
Adicionar
</button>

<h2>🎮 Simulador</h2>

<select id="adversario">

<option>Argentina</option>
<option>França</option>
<option>Espanha</option>
<option>Inglaterra</option>
<option>Alemanha</option>
<option>Portugal</option>
<option>Uruguai</option>

</select>

<button onclick="simularPartida()">
▶️ Simular Partida
</button>

<div id="resultadoPartida">
Aguardando partida...
</div>

<h2>🪑 Banco de Reservas</h2>

<div class="lista" id="listaJogadores"></div>

</div>

<!-- CAMPO -->

<div class="campo" id="campo">

<div class="linha-meio"></div>

<div class="centro"></div>

<div class="gol topo-gol"></div>

<div class="gol baixo-gol"></div>

</div>

</div>

<!-- SOM -->

<audio id="torcida" loop>

<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_4d4db9c2db.mp3?filename=stadium-crowd-ambience-110673.mp3">

</audio>

<script>

/* ========================================= */
/* JOGADORES */
/* ========================================= */

const jogadores = [

["Alisson",1,"GOL",89],
["Ederson",23,"GOL",88],
["Weverton",12,"GOL",83],

["Alex Sandro",6,"LE",82],
["Danilo",2,"LD",83],
["Douglas Santos",16,"LE",81],
["Wesley",13,"LD",79],

["Bremer",3,"ZAG",86],
["Gabriel Magalhães",4,"ZAG",85],
["Ibañez",14,"ZAG",82],
["Léo Pereira",15,"ZAG",81],
["Marquinhos",5,"ZAG",87],

["Bruno Guimarães",17,"MEI",86],
["Casemiro",8,"VOL",84],
["Lucas Paquetá",10,"MEI",85],

["Endrick",9,"ATA",82],
["Gabriel Martinelli",11,"PE",85],
["Neymar",10,"CAM",90],
["Raphinha",7,"PD",87],
["Vinicius Jr.",7,"PE",91]

];

const lista =
document.getElementById("listaJogadores");

const campo =
document.getElementById("campo");

/* ========================================= */
/* BANCO */
/* ========================================= */

jogadores.forEach(j => {

const div =
document.createElement("div");

div.className = "item";

div.innerHTML =
`${j[0]} (${j[2]}) - OVR ${j[3]}`;

div.onclick = ()=>{

document.getElementById("nome").value = j[0];
document.getElementById("numero").value = j[1];
document.getElementById("posicao").value = j[2];

};

lista.appendChild(div);

});

/* ========================================= */
/* CRIAR JOGADOR */
/* ========================================= */

function criarJogador(
nome,
numero,
pos,
overall,
top,
left
){

const jogador =
document.createElement("div");

jogador.className = "jogador";

jogador.style.top = top;
jogador.style.left = left;

jogador.innerHTML = `

<button class="remover">
X
</button>

<div class="overall">
${overall}
</div>

<div class="numero">
${numero}
</div>

<div class="nome">
${nome}
</div>

<div class="pos">
${pos}
</div>

`;

campo.appendChild(jogador);

/* REMOVER */

jogador.querySelector(".remover")
.onclick = ()=>{

jogador.remove();

};

/* DRAG */

let segurando = false;

let offsetX, offsetY;

jogador.addEventListener(
"mousedown",
e=>{

segurando = true;

offsetX =
e.clientX - jogador.offsetLeft;

offsetY =
e.clientY - jogador.offsetTop;

});

document.addEventListener(
"mousemove",
e=>{

if(!segurando) return;

let x =
e.clientX - offsetX;

let y =
e.clientY - offsetY;

const maxX =
campo.clientWidth -
jogador.clientWidth;

const maxY =
campo.clientHeight -
jogador.clientHeight;

if(x < 0) x = 0;
if(y < 0) y = 0;

if(x > maxX) x = maxX;
if(y > maxY) y = maxY;

jogador.style.left =
x + "px";

jogador.style.top =
y + "px";

});

document.addEventListener(
"mouseup",
()=>{

segurando = false;

});

}

/* ========================================= */
/* ADICIONAR */
/* ========================================= */

function adicionarJogador(){

const nome =
document.getElementById("nome").value;

const numero =
document.getElementById("numero").value;

const pos =
document.getElementById("posicao").value;

if(!nome || !numero || !pos){

alert("Preencha tudo!");

return;

}

criarJogador(
nome,
numero,
pos,
80,
"40%",
"40%"
);

}

/* ========================================= */
/* RESET */
/* ========================================= */

function resetarCampo(){

document
.querySelectorAll(".jogador")
.forEach(j=>{

j.remove();

});

}

/* ========================================= */
/* SALVAR */
/* ========================================= */

function salvarEscalacao(){

const dados = [];

document
.querySelectorAll(".jogador")
.forEach(j=>{

dados.push({

html:j.innerHTML,
top:j.style.top,
left:j.style.left

});

});

localStorage.setItem(
"escalacaoBrasil",
JSON.stringify(dados)
);

alert("Escalação salva!");

}

/* ========================================= */
/* CARREGAR */
/* ========================================= */

function carregarEscalacao(){

resetarCampo();

const dados =
JSON.parse(
localStorage.getItem(
"escalacaoBrasil"
)
);

if(!dados) return;

dados.forEach(d=>{

const div =
document.createElement("div");

div.className = "jogador";

div.innerHTML = d.html;

div.style.top = d.top;
div.style.left = d.left;

campo.appendChild(div);

});

}

/* ========================================= */
/* FORMAÇÃO */
/* ========================================= */

function mudarFormacao(){

resetarCampo();

criarJogador(
"Alisson",1,"GOL",89,
"82%","45%"
);

criarJogador(
"Danilo",2,"LD",83,
"65%","15%"
);

criarJogador(
"Bremer",3,"ZAG",86,
"68%","35%"
);

criarJogador(
"Marquinhos",5,"ZAG",87,
"68%","55%"
);

criarJogador(
"Alex Sandro",6,"LE",82,
"65%","75%"
);

criarJogador(
"Casemiro",8,"VOL",84,
"45%","30%"
);

criarJogador(
"Bruno G.",17,"MEI",86,
"42%","50%"
);

criarJogador(
"Lucas Paquetá",10,"MEI",85,
"45%","70%"
);

criarJogador(
"Vinicius Jr.",7,"PE",91,
"18%","20%"
);

criarJogador(
"Endrick",9,"ATA",82,
"10%","45%"
);

criarJogador(
"Raphinha",11,"PD",87,
"18%","70%"
);

}

/* ========================================= */
/* SIMULADOR */
/* ========================================= */

function simularPartida(){

const adversario =
document.getElementById("adversario").value;

let forcaBrasil = 0;

document
.querySelectorAll(".overall")
.forEach(o=>{

forcaBrasil += Number(o.innerHTML);

});

forcaBrasil =
Math.floor(forcaBrasil / 11);

const forcas = {

"Argentina":89,
"França":90,
"Espanha":88,
"Inglaterra":87,
"Alemanha":86,
"Portugal":85,
"Uruguai":84

};

const forcaAdv =
forcas[adversario];

let golsBrasil =
Math.floor(Math.random()*5);

let golsAdv =
Math.floor(Math.random()*5);

if(forcaBrasil > forcaAdv){

golsBrasil += 1;

}

if(forcaAdv > forcaBrasil){

golsAdv += 1;

}

if(golsBrasil > 5)
golsBrasil = 5;

if(golsAdv > 5)
golsAdv = 5;

const resultado =
`🇧🇷 Brasil ${golsBrasil} x ${golsAdv} ${adversario}`;

document.getElementById(
"resultadoPartida"
).innerHTML = resultado;

document.querySelector(
".placar"
).innerHTML =
`BRA ${golsBrasil} x ${golsAdv} ${adversario.substring(0,3).toUpperCase()}`;

/* GOL */

const gol =
document.createElement("div");

gol.className = "golAnimacao";

if(golsBrasil > golsAdv){

gol.innerHTML =
"⚽ GOOOOOL DO BRASIL";

}else if(golsAdv > golsBrasil){

gol.innerHTML =
"😢 DERROTA";

}else{

gol.innerHTML =
"🤝 EMPATE";

}

document.body.appendChild(gol);

setTimeout(()=>{

gol.remove();

},2000);

/* SOM */

document
.getElementById("torcida")
.play();

}

/* ========================================= */
/* CRONÔMETRO */
/* ========================================= */

let segundos = 0;

setInterval(()=>{

segundos++;

let min =
String(
Math.floor(segundos/60)
).padStart(2,"0");

let seg =
String(segundos%60)
.padStart(2,"0");

document.getElementById(
"cronometro"
).innerHTML =
`${min}:${seg}`;

},1000);

/* ========================================= */
/* SOM */
/* ========================================= */

document.body
.addEventListener(
"click",
()=>{

document
.getElementById("torcida")
.play();

},
{once:true}
);

/* ========================================= */
/* INTRO */
/* ========================================= */

setTimeout(()=>{

document.getElementById(
"intro"
).style.display = "none";

},5000);

/* ========================================= */
/* START */
/* ========================================= */

mudarFormacao();

</script>

</body>
</html>
